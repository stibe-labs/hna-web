name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 187.127.147.191
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/hna-repo
            git pull origin main
            cd hna-website
            npm install
            npm run build
            PORT=3002 pm2 restart hna-website --update-env || PORT=3002 pm2 start npm --name "hna-website" -- start
